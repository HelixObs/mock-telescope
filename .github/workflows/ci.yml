name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install helixobs from source
        run: pip install "git+https://github.com/HelixObs/client-python.git"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest --tb=short
